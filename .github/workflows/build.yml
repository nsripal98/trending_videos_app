name: TrendVault CI/CD — Build & Release APK

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger

env:
  FLUTTER_VERSION: '3.22.0'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run tests & lint
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test --coverage
        continue-on-error: true

  # ─────────────────────────────────────────
  # JOB 2: Build debug APK (every push)
  # ─────────────────────────────────────────
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --target-platform android-arm,android-arm64

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trendvault-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3: Build release APK (on tag push)
  # ─────────────────────────────────────────
  build-release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # Decode keystore from GitHub secret (base64 encoded)
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/trendvault-release.jks

      - name: Build release APK (signed)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --build-name=$(echo ${{ github.ref_name }} | sed 's/v//') \
            --build-number=${{ github.run_number }}

      - name: Build release APK (unsigned fallback)
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          flutter build apk --release \
            --target-platform android-arm,android-arm64 \
            --build-name=$(echo ${{ github.ref_name }} | sed 's/v//') \
            --build-number=${{ github.run_number }}

      - name: Rename APK with version
        run: |
          VERSION=${{ github.ref_name }}
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/TrendVault-${VERSION}.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrendVault-${{ github.ref_name }}-release
          path: build/app/outputs/flutter-apk/TrendVault-*.apk
          retention-days: 90

      # ── Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TrendVault ${{ github.ref_name }}"
          body: |
            ## 🚀 TrendVault ${{ github.ref_name }}

            ### What's in this release
            - Trending videos aggregated from Instagram, X, Facebook, YouTube
            - Location-based filtering: Country → State → District → City
            - AI-powered content insights for creators
            - Trending hashtags with growth rate tracking
            - One-tap copy for hashtags and content ideas

            ### Download
            👇 Download the APK below and install on your Android device.
            *(Enable "Install from unknown sources" in Settings)*

            ### Build info
            - Build number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          files: |
            build/app/outputs/flutter-apk/TrendVault-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 4: Build split APKs per ABI
  # ─────────────────────────────────────────
  build-split:
    name: 📦 Build Split APKs
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --build-name=$(echo ${{ github.ref_name }} | sed 's/v//') \
            --build-number=${{ github.run_number }}

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: TrendVault-${{ github.ref_name }}-split-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 90
