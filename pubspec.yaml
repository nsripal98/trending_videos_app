name: trendvault
description: TrendVault - Trending Videos Aggregator with Location-Based Insights for Content Creators
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3
  http: ^1.2.1
  connectivity_plus: ^5.0.2

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Video
  youtube_player_flutter: ^9.1.1
  video_player: ^2.8.3
  chewie: ^1.7.4

  # Social / Webview
  webview_flutter: ^4.7.0
  url_launcher: ^6.2.6

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts & Analytics
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  share_plus: ^9.0.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  infinite_scroll_pagination: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
