name: trendvault
description: TrendVault - Trending Videos Aggregator with Location-Based Insights for Content Creators
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # UI Utilities
  cached_network_image: ^3.3.1
  timeago: ^3.6.1

  # Navigation / Launch
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
